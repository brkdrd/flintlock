  <circle cx="3" cy="8" r="2" fill="#ffd700"/>
  <!-- Cone beam -->
  <polygon points="5,8 14,3 14,13" fill="#ffd700" opacity="0.5"/>
  <line x1="5" y1="8" x2="14" y2="3" stroke="#ffd700" stroke-width="1.2"/>
  <line x1="5" y1="8" x2="14" y2="13" stroke="#ffd700" stroke-width="1.2"/>
