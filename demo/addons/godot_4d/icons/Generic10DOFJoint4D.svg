<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 16 16">
  <!-- Central joint sphere -->
  <circle cx="8" cy="8" r="2.5" fill="none" stroke="#80cbc4" stroke-width="1.5"/>
  <!-- Multiple axes radiating (representing many DOF) -->
  <line x1="8" y1="1" x2="8" y2="5.5" stroke="#80cbc4" stroke-width="1.2"/>
  <line x1="8" y1="10.5" x2="8" y2="15" stroke="#80cbc4" stroke-width="1.2"/>
  <line x1="1" y1="8" x2="5.5" y2="8" stroke="#80cbc4" stroke-width="1.2"/>
  <line x1="10.5" y1="8" x2="15" y2="8" stroke="#80cbc4" stroke-width="1.2"/>
  <line x1="2.5" y1="2.5" x2="6.2" y2="6.2" stroke="#80cbc4" stroke-width="1"/>
  <line x1="13.5" y1="2.5" x2="9.8" y2="6.2" stroke="#80cbc4" stroke-width="1"/>
  <line x1="2.5" y1="13.5" x2="6.2" y2="9.8" stroke="#80cbc4" stroke-width="1"/>
  <line x1="13.5" y1="13.5" x2="9.8" y2="9.8" stroke="#80cbc4" stroke-width="1"/>
  <!-- Fill center -->
  <circle cx="8" cy="8" r="1" fill="#80cbc4"/>
</svg>
